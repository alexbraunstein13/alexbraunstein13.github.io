<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Braunstein</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      text-align: center;
      padding: 3rem 2rem;
    }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.5px; }
    p  { margin-top: 1rem; font-size: 1.1rem; color: #555; }
    .coming-soon {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1.2rem;
      border: 1.5px solid #ccc;
      border-radius: 999px;
      font-size: 0.85rem;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Alex Braunstein</h1>
    <p>Portfolio &amp; Publications — coming soon.</p>
    <span class="coming-soon">Under Construction</span>
  </div>
</body>
</html>
